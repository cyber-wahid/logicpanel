networks:
  # Internal network for LogicDock services
  logicdock_internal:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
  redis_data:
  logicdock_db_maria_data:
  logicdock_user_apps: # Let's Encrypt certificate storage

  # Traefik logs
  traefik_logs:


services:
  # Traefik - Reverse Proxy & SSL Termination
  traefik:
    image: traefik:v3.0
    container_name: logicdock_traefik
    restart: unless-stopped
    depends_on:
      - docker-proxy
    ports:
      - "80:80" # HTTP (Let's Encrypt challenge + redirect)
      - "443:443" # HTTPS (standard)
      - "443:443/udp" # HTTP/3 (QUIC) on port 443
      - "777:777" # User Panel (HTTPS)
      - "777:777/udp" # HTTP/3 (QUIC) on port 777
      - "999:999" # Master Panel (HTTPS)
      - "999:999/udp" # HTTP/3 (QUIC) on port 999
      # - "8080:8080"  # Traefik Dashboard (dev only)
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./docker/traefik/apps:/etc/traefik/apps:ro
      - ./letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ADMIN_EMAIL:-admin@logicdock.cloud}
    networks:
      - logicdock_internal
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"

  # Docker Socket Proxy - Secure Docker API access
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: logicdock_socket_proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - POST=1
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - VOLUMES=1
      - START=1
      - STOP=1
      - KILL=1
      - RESTART=1
      # Required for Traefik
      - VERSION=1
      - EVENTS=1
      - PING=1
    networks:
      - logicdock_internal

  # LogicDock Application (The Dashboard)
  app:
    image: ghcr.io/logicdock/logicdock:latest
    build: .
    container_name: logicdock_app
    restart: unless-stopped
    # Ports exposed via Traefik, not directly
    expose:
      - "80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=logicdock-db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-logicdock}
      - DB_USERNAME=${DB_USERNAME:-logicdock}
      - DB_PASSWORD=${DB_PASSWORD:-logicdock_password}
      - MYSQL_CONTAINER=lp-mysql-mother
      - POSTGRES_CONTAINER=lp-postgres-mother
      - MONGO_CONTAINER=lp-mongo-mother
      # Docker Configuration - Use Proxy
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_NETWORK=${DOCKER_NETWORK:-panel_logicdock_internal}
      - USER_APPS_PATH=/var/www/html/storage/user-apps
      - USER_APPS_HOST_PATH=${USER_APPS_HOST_PATH:-/opt/logicdock/storage/user-apps}
      - APP_DOMAIN=${PANEL_DOMAIN:-logicdock.cloud}
      - PANEL_DOMAIN=${PANEL_DOMAIN:-logicdock.cloud}
      - MASTER_PORT=${MASTER_PORT:-999}
      - USER_PORT=${USER_PORT:-777}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - .:/var/www/html
    networks:
      - logicdock_internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/public/health.php" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      logicdock-db:
        condition: service_healthy
      mysql:
        condition: service_started
      postgres:
        condition: service_started
      mongo:
        condition: service_started
      redis:
        condition: service_started
      docker-proxy:
        condition: service_started
      traefik:
        condition: service_started
    labels:
      # Enable Traefik for this service
      - "traefik.enable=true"

      # User Panel Router (Port 777) - HTTPS with TLS
      - "traefik.http.routers.userpanel.rule=PathPrefix(`/`)"
      - "traefik.http.routers.userpanel.entrypoints=userpanel"
      - "traefik.http.routers.userpanel.tls=true"
      - "traefik.http.routers.userpanel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.userpanel.tls.domains[0].main=${PANEL_DOMAIN:-localhost}"
      - "traefik.http.routers.userpanel.service=logicdock-app"
      - "traefik.http.routers.userpanel.middlewares=userpanel-headers@file"

      # Master Panel Router (Port 999) - HTTPS with TLS
      - "traefik.http.routers.masterpanel.rule=PathPrefix(`/`)"
      - "traefik.http.routers.masterpanel.entrypoints=masterpanel"
      - "traefik.http.routers.masterpanel.tls=true"
      - "traefik.http.routers.masterpanel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.masterpanel.tls.domains[0].main=${PANEL_DOMAIN:-localhost}"
      - "traefik.http.routers.masterpanel.service=logicdock-app"
      - "traefik.http.routers.masterpanel.middlewares=masterpanel-headers@file"

      # Default HTTPS Router (Port 443) - redirects to User Panel
      - "traefik.http.routers.default.rule=PathPrefix(`/`)"
      - "traefik.http.routers.default.entrypoints=websecure"
      - "traefik.http.routers.default.tls=true"
      - "traefik.http.routers.default.tls.certresolver=letsencrypt"
      - "traefik.http.routers.default.tls.domains[0].main=${PANEL_DOMAIN:-localhost}"
      - "traefik.http.routers.default.service=logicdock-app"

      # Service Definition
      - "traefik.http.services.logicdock-app.loadbalancer.server.port=80"

  # Terminal Gateway (PHP Ratchet Sidecar)
  terminal-gateway:
    image: ghcr.io/logicdock/logicdock/gateway:latest
    build: ./services/gateway
    container_name: logicdock_gateway
    restart: unless-stopped
    expose:
      - "3002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - logicdock_internal
    labels:
      - "traefik.enable=true"
      # WebSocket Router for Terminal
      - "traefik.http.routers.terminal-ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.terminal-ws.entrypoints=userpanel,masterpanel,websecure"
      - "traefik.http.routers.terminal-ws.tls=true"
      - "traefik.http.routers.terminal-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.terminal-ws.service=terminal-gateway"
      - "traefik.http.services.terminal-gateway.loadbalancer.server.port=3002"

  # LogicDock Dedicated Database (MariaDB 10.11)
  logicdock-db:
    image: mariadb:10.11
    container_name: ${DB_HOST_MAIN:-logicdock_db}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-logicdock}
      MYSQL_USER: ${DB_USERNAME:-logicdock}
      MYSQL_PASSWORD: ${DB_PASSWORD:-logicdock_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - logicdock_db_maria_data:/var/lib/mysql
    networks:
      - logicdock_internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh --connect --innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M

  # MariaDB - Mother Container
  mysql:
    image: mariadb:11.2
    container_name: ${DB_HOST_MYSQL:-lp_mysql_mother}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306" # Localhost only
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - logicdock_internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # PostgreSQL - Mother Container
  # PostgreSQL - Mother Container
  postgres:
    image: postgres:16-alpine
    container_name: ${DB_HOST_PG:-lp_postgres_mother}
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432" # Localhost only
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - logicdock_internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # MongoDB - Mother Container
  # MongoDB - Mother Container
  mongo:
    image: mongo:7.0
    container_name: ${DB_HOST_MONGO:-lp_mongo_mother}
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017" # Changed to localhost only for security
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - logicdock_internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Redis - For Queue and Cache
  redis:
    image: redis:7-alpine
    container_name: logicdock_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - logicdock_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # DB Provisioner Service (Microservice)
  db-provisioner:
    image: ghcr.io/logicdock/logicdock/db-provisioner:latest
    build: ./docker/db-provisioner
    container_name: logicdock_db_provisioner
    restart: unless-stopped
    # Expose port mostly for debugging, internal comm uses network
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - API_SECRET=${DB_PROVISIONER_SECRET}
      - MYSQL_HOST=${DB_HOST_MYSQL:-lp_mysql_mother}
      - MYSQL_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - POSTGRES_HOST=${DB_HOST_PG:-lp_postgres_mother}
      - POSTGRES_PORT=5432
      - POSTGRES_ROOT_PASSWORD=${POSTGRES_ROOT_PASSWORD}
      - MONGO_HOST=${DB_HOST_MONGO:-lp_mongo_mother}
      - MONGO_PORT=27017
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - logicdock_internal
    depends_on:
      - mysql
      - postgres
      - mongo
      # Adminer - Database Management (Optional, for development)
      # Adminer - Database Management
  adminer:
    image: adminer:latest
    container_name: logicdock_adminer
    restart: unless-stopped
    networks:
      - logicdock_internal
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`db.${PANEL_DOMAIN:-localhost}`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls=true"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
